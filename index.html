<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VK Fest 2026 Matcher</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --vk-blue: #0077ff;
            --card-bg: #f5f7fa;
            --btn-yes: #22c55e;
            --btn-maybe: #eab308;
            --btn-no: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--vk-blue);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .main-wrapper {
            width: 100%;
            max-width: 380px;
            background: white;
            border-radius: 28px;
            padding: 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 24px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        /* Шапка с фильтрами в стиле оригинального сайта */
        .header-filters {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .logo-text {
            color: var(--vk-blue);
            font-size: 16px;
            font-weight: 900;
        }

        .filter-select {
            border: none;
            background: #f0f2f5;
            padding: 6px 8px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 11px;
            color: #000;
            outline: none;
            cursor: pointer;
        }

        /* Контейнер для карточек */
        .card-deck {
            position: relative;
            width: 100%;
            flex-grow: 1;
            margin-bottom: 16px;
            height: 380px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 6px 16px rgba(0,0,0,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            transform-origin: center bottom;
        }

        /* Эффект стопки */
        .card:nth-last-child(1) { transform: scale(1) translateY(0); z-index: 3; }
        .card:nth-last-child(2) { transform: scale(0.95) translateY(12px); z-index: 2; opacity: 0.8; }
        .card:nth-last-child(3) { transform: scale(0.9) translateY(24px); z-index: 1; opacity: 0.4; }
        .card:nth-last-child(n+4) { display: none; }

        /* Анимации свайпов */
        .card.swipe-yes { transform: translate(150%, -20px) rotate(20deg) !important; opacity: 0; }
        .card.swipe-no { transform: translate(-150%, -20px) rotate(-20deg) !important; opacity: 0; }
        .card.swipe-maybe { transform: translate(0, -150%) scale(0.8) !important; opacity: 0; }

        .card-image {
            width: 100%;
            height: 75%;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .scene-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--vk-blue);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .card-info {
            padding: 12px;
            text-align: center;
            background: white;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .artist-name {
            font-size: 20px;
            font-weight: 800;
            margin: 0 0 4px 0;
            text-transform: uppercase;
        }

        .artist-tag {
            font-size: 12px;
            color: #65676b;
            margin: 0;
        }

        .buttons-container {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn {
            flex: 1;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s ease;
            color: white;
        }
        .btn:active { transform: scale(0.95); }
        .btn-no { background-color: var(--btn-no); }
        .btn-maybe { background-color: var(--btn-maybe); color: black; }
        .btn-yes { background-color: var(--btn-yes); }

        /* Экран результатов */
        .result-screen {
            display: none;
            text-align: center;
            padding: 20px 10px;
            height: 100%;
        }

        .form-input {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #e4e6eb;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
            text-align: center;
        }
    </style>
</head>

        let activeArtists = [];
        let currentIdx = 0;
        const totalVotes = { yes: [], maybe: [], no: [] };

        function filterChanged() {
            const selectedDate = document.getElementById('date-select').value;
            const selectedScene = document.getElementById('scene-select').value;

            // Сортируем базу под фильтры
            activeArtists = allArtists.filter(a => a.date === selectedDate && a.scene === selectedScene);
            currentIdx = 0;
            
            // Сбрасываем дисплей стопки, если он скрывался на финальном экране
            document.getElementById('deck').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('result-stage').style.display = 'none';

            renderDeck();
        }

        function renderDeck() {
            const deck = document.getElementById('deck');
            deck.innerHTML = '';

            const cardsToRender = activeArtists.slice(currentIdx, currentIdx + 3);

            if (cardsToRender.length === 0 && currentIdx > 0) {
                showResultScreen();
                return;
            } else if (cardsToRender.length === 0) {
                deck.innerHTML = '<div style="text-align:center; padding-top:120px; color:#65676b; font-weight:700; font-size:15px;">Список артистов пуст 🤷‍♂️</div>';
                document.getElementById('controls').style.display = 'none';
                return;
            }

            // Рендер задом наперед для верного наложения слоев
            cardsToRender.reverse().forEach((artist) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-image" style="background-image: url('${artist.img}')">
                        <div class="scene-badge">${artist.scene}</div>
                    </div>
                    <div class="card-info">
                        <h3 class="artist-name">${artist.name}</h3>
                        <p class="artist-tag">${artist.date}</p>
                    </div>
                `;
                deck.appendChild(card);
            });
        }

        function vote(type) {
            const deck = document.getElementById('deck');
            const topCard = deck.lastElementChild;
            if (!topCard || activeArtists.length === 0) return;

            topCard.classList.add(`swipe-${type}`);
            
            const artist = activeArtists[currentIdx];
            totalVotes[type].push(`${artist.name} (${artist.date}, ${artist.scene})`);

            currentIdx++;

            setTimeout(() => {
                renderDeck();
            }, 300);
        }

        function showResultScreen() {
            document.getElementById('deck').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('result-stage').style.display = 'block';
        }

        function sendDataToBot() {
            const name = document.getElementById('username').value.trim();
            if (!name) {
                alert('Введи свое имя!');
                return;
            }

            let report = `🎫 Мой VK Fest Match\n👤 Пользователь: ${name}\n\n`;
            if (totalVotes.yes.length) report += `🔥 ИДУ:\n• ${totalVotes.yes.join('\n• ')}\n\n`;
            if (totalVotes.maybe.length) report += `🤷‍♂️ 50/50:\n• ${totalVotes.maybe.join('\n• ')}\n\n`;
            if (totalVotes.no.length) report += `❌ МИМО:\n• ${totalVotes.no.join('\n• ')}`;

            tg.sendData(report);
            tg.close();
        }

        // Старт
        filterChanged();
    </script>
</body>
</html>
